  description: What happens when we delegate machine learning to another party? We build on a a cryptographic proof systems framework call PAC Verifciation [GYRS21] to define proof systems for verifiable delegation, in what we call Publicly-Verifiable Certificates of Statistical Validity (pvCSVs).
